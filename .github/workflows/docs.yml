name: docs

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - fin3/**/*.py
      - mkdocs.yml
      - pyproject.toml
      - .github/workflows/docs.yml
  workflow_dispatch: # allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Core + databento extra + dev group (mkdocs, mkdocstrings).
      # All are needed: mkdocstrings imports fin3 source to extract docstrings.
      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build site
        run: uv run mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4